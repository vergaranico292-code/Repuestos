<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Repuestos MP1000 - Precisión Móvil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; touch-action: none; }
        .header { background: #333; padding: 15px; text-align: center; border-bottom: 2px solid #ff9900; z-index: 100; position: relative; }
        #viewport { width: 100vw; height: calc(100vh - 70px); cursor: grab; overflow: hidden; position: relative; background: #222; }
        #zoom-container { position: absolute; transform-origin: 0 0; }
        #img-chancador { display: block; height: 95vh; width: auto; pointer-events: none; }
        
        .hotspot {
            position: absolute;
            width: 14px; height: 14px;
            background: rgba(255, 153, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 8px rgba(255, 153, 0, 0.5);
        }

        #modal {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #2c2c2c; padding: 15px; border-radius: 12px;
            border: 2px solid #ff9900; width: 85%; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <strong style="color: #ff9900;">VISOR REPUESTOS MP1000</strong><br>
    <small>Toca los puntos para ver detalles</small>
</div>

<div id="viewport">
    <div id="zoom-container">
        <img id="img-chancador" src="" alt="Cargando diagrama...">
        <div id="hotspots-layer"></div>
    </div>
</div>

<div id="modal">
    <h3 id="m-nombre" style="color:#ff9900; margin:0 0 5px 0;">Pieza</h3>
    <p style="margin:5px 0;"><strong>Código SAP:</strong> <span id="m-codigo"></span></p>
    <button onclick="this.parentElement.style.display='none'" style="width:100%; padding:10px; background:#ff9900; color:white; border:none; border-radius:5px; font-weight:bold; cursor: pointer;">CERRAR</button>
</div>

<script>
    // --- URL AUTOMÁTICA DESDE TU GITHUB ---
    const URL_IMAGEN = "https://raw.githubusercontent.com/vergaranico292-code/Repuestos/main/MP1000.png";

    const piezas = [
        // IZQUIERDA
       // IZQUIERDA - Ajustados al final de cada nombre
        { n: "Feed Plate", x: 8, y: 3, s: "100-001" },
        { n: "Locking Bolt", x: 9, y: 6, s: "100-002" },
        { n: "Torch Ring", x: 8, y: 9, s: "100-003" },
        
        { n: "Clamp Ring", x: 9, y: 23, s: "100-004" },
        { n: "Clamping Cylinder", x: 12, y: 26, s: "100-005" },
        { n: "Adjustment Ring", x: 11.5, y: 29.8, s: "100-006" },
        { n: "Tramp Release Cylinder", x: 15.5, y: 32.5, s: "100-007" }, // Bajado un poco el Y
        
        { n: "Head Ball", x: 8, y: 50, s: "100-008" },
        { n: "Head", x: 5, y: 53, s: "100-009" },
        { n: "Upper Head Bushing", x: 13, y: 56, s: "100-010" },
        { n: "Mantle", x: 6, y: 59, s: "100-011" },
        { n: "T-Seal", x: 6, y: 62, s: "100-012" },
        { n: "Lower Head Bushing", x: 15.5, y: 65, s: "100-013" }, // Bajado un poco el Y
        
        { n: "Mainframe Liner", x: 12, y: 80, s: "100-014" },
        { n: "U-Seal", x: 6, y: 83, s: "100-015" },
        { n: "Arm Guard", x: 9, y: 86, s: "100-016" },
        { n: "Mainshaft", x: 8.5, y: 89, s: "100-017" },
        { n: "Thrust Washer", x: 12, y: 92, s: "100-018" },
        { n: "Mainframe", x: 9, y: 95, s: "100-019" },

        // DERECHA
        { n: "Feed Hopper", x: 93.8, y: 1.8, s: "200-001" },
        { n: "Bowl Liner", x: 93.8, y: 4.5, s: "200-002" },
        { n: "Adjustment Cap", x: 93.8, y: 7.2, s: "200-003" },
        { n: "Bowl", x: 93.8, y: 9.9, s: "200-004" },
        { n: "Pin", x: 93.8, y: 21.0, s: "200-005" },
        { n: "Socket Liner", x: 93.8, y: 23.6, s: "200-006" },
        { n: "Socket", x: 93.8, y: 26.3, s: "200-007" },
        { n: "Hardware", x: 93.8, y: 37.5, s: "200-008" },
        { n: "Bowl Adapter Ring", x: 93.8, y: 40.1, s: "200-009" },
        { n: "Mainframe Seat Liner", x: 93.8, y: 42.8, s: "200-010" },
        { n: "Eccentric", x: 93.8, y: 52.8, s: "200-011" },
        { n: "Eccentric Bushing", x: 93.8, y: 55.4, s: "200-012" },
        { n: "Counterweight", x: 93.8, y: 58.1, s: "200-013" },
        { n: "Counterweight Guard", x: 93.8, y: 60.7, s: "200-014" },
        { n: "Thrust Bearing", x: 93.8, y: 63.4, s: "200-015" },
        { n: "Gear", x: 93.8, y: 66.0, s: "200-016" },
        { n: "Countershaft Box", x: 93.8, y: 77.2, s: "200-017" },
        { n: "Countershaft Box Guard", x: 93.8, y: 79.8, s: "200-018" },
        { n: "Flinger Housing", x: 93.8, y: 82.4, s: "200-019" },
        { n: "Oil Flinger", x: 93.8, y: 85.1, s: "200-020" },
        { n: "Countershaft Bushing", x: 93.8, y: 87.7, s: "200-021" },
        { n: "Countershaft", x: 93.8, y: 90.4, s: "200-022" },
        { n: "Pinion", x: 93.8, y: 93.1, s: "200-023" }
    ];

    const img = document.getElementById('img-chancador');
    const container = document.getElementById('zoom-container');
    const layer = document.getElementById('hotspots-layer');

    window.onload = () => {
        img.src = URL_IMAGEN;
        img.onload = renderHotspots;
    };

    function renderHotspots() {
        layer.innerHTML = '';
        piezas.forEach(p => {
            const div = document.createElement('div');
            div.className = 'hotspot';
            div.style.left = p.x + '%';
            div.style.top = p.y + '%';
            div.onclick = (e) => {
                e.stopPropagation();
                document.getElementById('m-nombre').innerText = p.n;
                document.getElementById('m-codigo').innerText = p.s;
                document.getElementById('modal').style.display = 'block';
            };
            layer.appendChild(div);
        });
    }

    // Zoom y Pan con Hammer.js
    const mc = new Hammer.Manager(document.getElementById('viewport'));
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Pan());

    let scale = 1, lastScale = 1, posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;

    mc.on("pinchmove", (e) => {
        scale = Math.max(1, Math.min(lastScale * e.scale, 4));
        updateTransform();
    });
    mc.on("pinchend", () => lastScale = scale);
    mc.on("panmove", (e) => {
        posX = lastPosX + e.deltaX;
        posY = lastPosY + e.deltaY;
        updateTransform();
    });
    mc.on("panend", () => { lastPosX = posX; lastPosY = posY; });

    function updateTransform() {
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }
</script>
</body>
</html>
